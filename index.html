<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuenta regresiva · Fin del mandato de Milei</title>
<style>
  :root {
    --bg: #0f1419;
    --surface: #1a2028;
    --text: #f5f5f0;
    --text-muted: #9ca3af;
    --border: rgba(255,255,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow-x: hidden;
  }
  canvas#confetti {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
    text-align: center;
  }
  .badge {
    display: inline-block;
    background: rgba(239, 159, 39, 0.15);
    color: #FAC775;
    font-size: 12px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 999px;
    margin-bottom: 1.25rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  h1 {
    font-size: 34px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .subtitle {
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 2.5rem;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 2.5rem;
  }
  .cell {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.75rem 0.5rem;
  }
  .cell .num {
    font-size: 44px;
    font-weight: 500;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .cell .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .c1 .num { color: #AFA9EC; }
  .c2 .num { color: #5DCAA5; }
  .c3 .num { color: #ED93B1; }
  .c4 .num { color: #F0997B; }
  .message {
    font-size: 16px;
    font-weight: 500;
    margin-bottom: 2rem;
    min-height: 1.5em;
    transition: opacity 0.4s;
  }
  .progress-wrap {
    max-width: 520px;
    margin: 0 auto;
  }
  .progress-head {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .progress-head .pct {
    font-weight: 500;
    color: #5DCAA5;
  }
  .bar {
    height: 12px;
    background: rgba(255,255,255,0.05);
    border-radius: 999px;
    overflow: hidden;
    display: flex;
  }
  .bar-done { background: rgba(255,255,255,0.08); height: 100%; width: 0%; }
  .bar-left { background: #1D9E75; height: 100%; width: 100%; transition: width 0.6s; }
  .left-label {
    font-size: 13px;
    color: #5DCAA5;
    margin-top: 10px;
    font-weight: 500;
  }
  @media (max-width: 520px) {
    h1 { font-size: 26px; }
    .cell { padding: 1.25rem 0.25rem; }
    .cell .num { font-size: 32px; }
  }
</style>
</head>
<body>
<canvas id="confetti"></canvas>
<div class="wrap">
  <div class="badge">¡Falta cada vez menos!</div>
  <h1>Fin del mandato de Milei</h1>
  <p class="subtitle">10 de diciembre de 2027 · Asume un nuevo gobierno</p>

  <div class="grid">
    <div class="cell c1"><div class="num" id="days">—</div><div class="label">Días</div></div>
    <div class="cell c2"><div class="num" id="hours">—</div><div class="label">Horas</div></div>
    <div class="cell c3"><div class="num" id="mins">—</div><div class="label">Minutos</div></div>
    <div class="cell c4"><div class="num" id="secs">—</div><div class="label">Segundos</div></div>
  </div>

  <p class="message" id="message">Cada segundo nos acerca a una nueva etapa 🎉</p>

  <div class="progress-wrap">
    <div class="progress-head">
      <span>Hoy</span>
      <span class="pct" id="pct">—</span>
      <span>10 dic 2027</span>
    </div>
    <div class="bar">
      <div class="bar-done" id="bar-done"></div>
      <div class="bar-left" id="bar-left"></div>
    </div>
    <p class="left-label"><span id="left-label">—</span> restante</p>
  </div>
</div>

<script>
(function(){
  var start = new Date('2023-12-10T15:00:00Z').getTime();
  var end = new Date('2027-12-10T15:00:00Z').getTime();
  function pad(n){ return n < 10 ? '0' + n : '' + n; }

  var messages = [
    'Cada segundo nos acerca a una nueva etapa 🎉',
    'La democracia sigue su curso ✨',
    'Pronto, nuevas esperanzas 🌅',
    'El cambio se acerca 🎊',
    'Una nueva página está por escribirse 📖'
  ];
  var msgIdx = 0;
  setInterval(function(){
    msgIdx = (msgIdx + 1) % messages.length;
    var el = document.getElementById('message');
    if (el) el.textContent = messages[msgIdx];
  }, 4000);

  function tick(){
    var now = Date.now();
    var diff = end - now;
    if (diff <= 0) {
      document.getElementById('days').textContent = '0';
      document.getElementById('hours').textContent = '00';
      document.getElementById('mins').textContent = '00';
      document.getElementById('secs').textContent = '00';
      document.getElementById('bar-done').style.width = '100%';
      document.getElementById('bar-left').style.width = '0%';
      document.getElementById('pct').textContent = '0% restante';
      document.getElementById('left-label').textContent = '0 días';
      document.getElementById('message').textContent = '¡Comienza una nueva etapa! 🎉🎊';
      return;
    }
    var days = Math.floor(diff / 86400000);
    var hours = Math.floor((diff % 86400000) / 3600000);
    var mins = Math.floor((diff % 3600000) / 60000);
    var secs = Math.floor((diff % 60000) / 1000);
    document.getElementById('days').textContent = days.toLocaleString('es-AR');
    document.getElementById('hours').textContent = pad(hours);
    document.getElementById('mins').textContent = pad(mins);
    document.getElementById('secs').textContent = pad(secs);

    var donePct = Math.min(100, Math.max(0, ((now - start) / (end - start)) * 100));
    var leftPct = 100 - donePct;
    document.getElementById('bar-done').style.width = donePct.toFixed(1) + '%';
    document.getElementById('bar-left').style.width = leftPct.toFixed(1) + '%';
    document.getElementById('pct').textContent = leftPct.toFixed(1) + '% restante';
    document.getElementById('left-label').textContent = days.toLocaleString('es-AR') + ' días';
  }
  tick();
  setInterval(tick, 1000);

  var canvas = document.getElementById('confetti');
  var ctx = canvas.getContext('2d');
  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);
  var colors = ['#7F77DD', '#1D9E75', '#D4537E', '#D85A30', '#EF9F27'];
  var pieces = [];
  for (var i = 0; i < 60; i++) {
    pieces.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: 3 + Math.random() * 4,
      c: colors[Math.floor(Math.random() * colors.length)],
      vy: 0.3 + Math.random() * 0.7,
      vx: (Math.random() - 0.5) * 0.5
    });
  }
  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < pieces.length; i++) {
      var p = pieces[i];
      ctx.fillStyle = p.c;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      p.y += p.vy;
      p.x += p.vx;
      if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
</body>
</html>
